name: Build Play Store AAB
on: { workflow_dispatch: {} }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm install --legacy-peer-deps
      - name: Upgrade Capacitor and Add AdMob Plugin
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/status-bar@latest @capawesome/capacitor-android-edge-to-edge-support@latest @capacitor-community/admob@latest --legacy-peer-deps
      - run: npm run build
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: android-actions/setup-android@v3
      - run: npx cap add android || true
      - run: npx cap sync android
      - name: Configure Android 15 Edge-to-Edge, SDK 36/35, and AdMob ID
        run: |
          node - <<'NODE'
          const fs=require('fs');
          let cfg={};
          if(fs.existsSync('capacitor.config.json')) cfg=JSON.parse(fs.readFileSync('capacitor.config.json','utf8'));
          cfg.android={...(cfg.android||{}), adjustMarginsForEdgeToEdge:'auto'};
          cfg.plugins={...(cfg.plugins||{})};
          cfg.plugins.EdgeToEdge={ backgroundColor:'#0b1220', statusBarColor:'#0b1220', navigationBarColor:'#0b1220' };
          fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg,null,2));
          NODE
          sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 36/" android/variables.gradle || true
          sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 35/" android/variables.gradle || true
          sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-8576378038310405~4113931989"/>' android/app/src/main/AndroidManifest.xml
      - name: Install SDK Platforms
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "platforms;android-35"
      - name: Force version 1.0.9 for Play Console
        run: |
          sed -i "s/versionCode [0-9]*/versionCode 9/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.9\"/" android/app/build.gradle
      - run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick > /dev/null
          rm -f android/app/src/main/res/mipmap-anydpi-v26/*.xml
          for s in 48 72 96 144 192; do d=""; case $s in 48)d=mdpi;;72)d=hdpi;;96)d=xhdpi;;144)d=xxhdpi;;192)d=xxxhdpi;;esac; convert assets/icon.png -resize ${s}x${s} android/app/src/main/res/mipmap-${d}/ic_launcher.png; convert assets/icon.png -resize ${s}x${s} android/app/src/main/res/mipmap-${d}/ic_launcher_round.png; convert assets/icon.png -resize ${s}x${s} android/app/src/main/res/mipmap-${d}/ic_launcher_foreground.png; done
      - run: cp upload-keystore.jks android/app/upload-keystore.jks || true
      - run: cd android && ./gradlew bundleRelease
      - uses: actions/upload-artifact@v4
        with: { name: app-aab, path: android/app/build/outputs/bundle/**/*.aab }
