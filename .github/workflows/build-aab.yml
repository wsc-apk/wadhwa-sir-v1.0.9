name: Build Play Store AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/status-bar --save

      - name: Build Ionic web
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK base
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Configure for Netlify + StatusBar (API 35 fix)
        run: |
          echo '{"appId":"com.wadhwasir.classroom","appName":"Wadhwa Sir Classroom","webDir":"www","server":{"url":"https://wsc-apk.netlify.app","androidScheme":"https"},"plugins":{"StatusBar":{"overlaysWebView":false,"backgroundColor":"#0B0F1A"}}}' > capacitor.config.json
          npx cap copy android

      - name: Upgrade Gradle + AGP for API 35
        run: |
          sed -i "s/gradle-[0-9.]*-all.zip/gradle-8.9-all.zip/" android/gradle/wrapper/gradle-wrapper.properties
          sed -i "s/com.android.tools.build:gradle:[0-9.]*'/com.android.tools.build:gradle:8.7.3'/" android/build.gradle

      - name: Force API 35 versions
        run: |
          sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 35/" android/variables.gradle
          sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 35/" android/variables.gradle
          sed -i "s/minSdkVersion = [0-9]*/minSdkVersion = 24/" android/variables.gradle

      - name: Install FIXED Android 35 platform
        run: |
          rm -rf $ANDROID_HOME/platforms/android-35
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set custom app icon
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick > /dev/null
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          for size in 48 72 96 144 192; do
            dir=""; case $size in 48) dir=mdpi;; 72) dir=hdpi;; 96) dir=xhdpi;; 144) dir=xxhdpi;; 192) dir=xxxhdpi;; esac
            convert assets/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${dir}/ic_launcher.png
            convert assets/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${dir}/ic_launcher_round.png
            convert assets/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${dir}/ic_launcher_foreground.png
          done

      - name: Copy keystore
        run: cp upload-keystore.jks android/app/upload-keystore.jks

      - name: Build signed AAB
        working-directory: android
        run: ./gradlew bundleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/upload-keystore.jks -Pandroid.injected.signing.store.password=Uhk@738_ghRU87@98dfs -Pandroid.injected.signing.key.alias=upload -Pandroid.injected.signing.key.password=Uhk@738_ghRU87@98dfs

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wadhwa-Sir-Classroom-AAB-WORKING
          path: android/app/build/outputs/bundle/release/app-release.aab
