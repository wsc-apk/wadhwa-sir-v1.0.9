name: Build Test APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Ionic web
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Opt-out of Android 15 edge-to-edge (May 2026 fix)
        run: |
          # This is the official 2025-2026 fix for header overlap on API 35
          sed -i '/<style name="AppTheme.NoActionBar">/a \        <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>' android/app/src/main/res/values/styles.xml
          sed -i '/<style name="AppTheme.NoActionBar">/a \        <item name="android:windowOptOutEdgeToEdgeEnforcement">true</item>' android/app/src/main/res/values-v27/styles.xml || true

      - name: Force API 35
        run: |
          sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 35/" android/variables.gradle
          sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 35/" android/variables.gradle
          sed -i "s/minSdkVersion = [0-9]*/minSdkVersion = 24/" android/variables.gradle

      - name: Upgrade Gradle for API 35
        run: |
          sed -i "s/gradle-[0-9.]*-all.zip/gradle-8.9-all.zip/" android/gradle/wrapper/gradle-wrapper.properties
          sed -i "s/com.android.tools.build:gradle:[0-9.]*'/com.android.tools.build:gradle:8.7.3'/" android/build.gradle

      - name: Install Android 35
        run: |
          rm -rf $ANDROID_HOME/platforms/android-35
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Set icon
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick > /dev/null
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          for size in 48 72 96 144 192; do
            dir=""; case $size in 48) dir=mdpi;; 72) dir=hdpi;; 96) dir=xhdpi;; 144) dir=xxhdpi;; 192) dir=xxxhdpi;; esac
            convert assets/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${dir}/ic_launcher.png
            convert assets/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${dir}/ic_launcher_round.png
            convert assets/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${dir}/ic_launcher_foreground.png
          done

      - name: Copy keystore
        run: cp upload-keystore.jks android/app/upload-keystore.jks

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/upload-keystore.jks -Pandroid.injected.signing.store.password=Uhk@738_ghRU87@98dfs -Pandroid.injected.signing.key.alias=upload -Pandroid.injected.signing.key.password=Uhk@738_ghRU87@98dfs

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Wadhwa-Sir-Classroom-APK-FINAL
          path: android/app/build/outputs/apk/release/app-release.apk
