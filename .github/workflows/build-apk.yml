name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Delete old android project
        run: rm -rf android

      - name: Add Android platform fresh
        run: npx cap add android

      - name: Generate icons and splash
        run: npx @capacitor/assets generate --android

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest for Android 16
        run: |
          sed -i 's/<application/<application android:usesCleartextTraffic="true" android:hardwareAccelerated="true"/' android/app/src/main/AndroidManifest.xml

      - name: Enable media playback without gesture
        run: |
          echo "webView.getSettings().setMediaPlaybackRequiresUserGesture(false);" >> android/app/src/main/java/com/wadhwasir/classroom/MainActivity.java

      - name: Build Debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wadhwa-sir-classroom-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
