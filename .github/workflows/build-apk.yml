name: Build Test APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Ionic web
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install Capacitor Assets
        run: npm install @capacitor/assets --save-dev

      - name: Generate icons from your assets
        run: |
          mkdir -p resources
          cp assets/icon.png resources/icon.png
          cp assets/splash.png resources/splash.png
          npx @capacitor/assets generate --iconBackgroundColor '#FF6B00' --iconBackgroundColorDark '#FF6B00' --splashBackgroundColor '#FF6B00'

      - name: Copy keystore
        run: cp upload-keystore.jks android/app/upload-keystore.jks

      - name: Build signed APK
        working-directory: android
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/upload-keystore.jks -Pandroid.injected.signing.store.password=Uhk@738_ghRU87@98dfs -Pandroid.injected.signing.key.alias=upload -Pandroid.injected.signing.key.password=Uhk@738_ghRU87@98dfs

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wadhwa-Sir-Classroom-APK
          path: android/app/build/outputs/apk/release/app-release.apk
